services:
  postgres:
    image: postgres:18-alpine
    container_name: stss-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stss -d stss"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stss-network

  redis:
    image: redis:7-alpine
    container_name: stss-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stss-network

  server:
    image: node:22-alpine
    container_name: stss-server
    working_dir: /app
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - ./backend:/app
      - ./shared:/shared
      - /app/node_modules
      - /app/.pnpm-store
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "corepack enable && pnpm install && pnpm db:generate && pnpm db:push --accept-data-loss && pnpm db:seed && pnpm dev"
    networks:
      - stss-network

  web:
    image: node:22-alpine
    container_name: stss-web
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
    volumes:
      - ./frontend:/app
      - ./shared:/shared
      - /app/node_modules
      - /app/.pnpm-store
    ports:
      - "5173:5173"
    depends_on:
      - server
    command: sh -c "corepack enable && pnpm install && pnpm dev"
    networks:
      - stss-network

  adminer:
    image: adminer:latest
    container_name: stss-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - stss-network

  test-server:
    image: node:22-alpine
    container_name: stss-test-server
    working_dir: /app
    environment:
      NODE_ENV: test
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app
      - ./shared:/shared
      - /app/node_modules
      - /app/.pnpm-store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "corepack enable && pnpm install && pnpm db:generate && pnpm test:run"
    networks:
      - stss-network

  test-web:
    image: node:22-alpine
    container_name: stss-test-web
    working_dir: /app
    volumes:
      - ./frontend:/app
      - ./shared:/shared
      - /app/node_modules
      - /app/.pnpm-store
    command: sh -c "corepack enable && pnpm install && pnpm test:run"
    networks:
      - stss-network

networks:
  stss-network:
    name: stss-network
