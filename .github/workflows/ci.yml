name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: cd backend && npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/stss

      - name: Build shared package
        run: cd shared && pnpm build

      - name: Run lint
        run: pnpm lint

      - name: Run type check
        run: pnpm typecheck

      - name: Validate and format Prisma schema
        run: cd backend && npx prisma validate && npx prisma format --check
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/stss
