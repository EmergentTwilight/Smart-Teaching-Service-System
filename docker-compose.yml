services:
  postgres:
    image: postgres:18-alpine
    container_name: stss-postgres
    environment:
      POSTGRES_USER: stss
      POSTGRES_PASSWORD: stss_dev_2026
      POSTGRES_DB: stss
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stss -d stss"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - stss-network

  redis:
    image: redis:7-alpine
    container_name: stss-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - stss-network

  server:
    image: node:22-alpine
    container_name: stss-server
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://stss:stss_dev_2026@postgres:5432/stss?connection_limit=10&pool_timeout=30
      REDIS_URL: redis://redis:6379
      JWT_SECRET: stss-dev-key-do-not-use-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 587
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: noreply@example.com
      FRONTEND_URL: http://localhost:5173
      CI: "true"
    volumes:
      - .:/app
      - root-node-modules:/app/node_modules
      - backend-node-modules:/app/backend/node_modules
      - frontend-node-modules:/app/frontend/node_modules
      - shared-node-modules:/app/shared/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "corepack enable &&
      corepack prepare pnpm@10.32.1 --activate &&
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @stss/server db:generate &&
      pnpm --filter @stss/shared build &&
      pnpm --filter @stss/server db:push --accept-data-loss &&
      pnpm --filter @stss/server db:seed &&
      pnpm --filter @stss/server dev"
    networks:
      - stss-network

  web:
    image: node:22-alpine
    container_name: stss-web
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
      DATABASE_URL: postgresql://stss:stss_dev_2026@postgres:5432/stss?connection_limit=10&pool_timeout=30
      CI: "true"
    volumes:
      - .:/app
      - root-node-modules:/app/node_modules
      - backend-node-modules:/app/backend/node_modules
      - frontend-node-modules:/app/frontend/node_modules
      - shared-node-modules:/app/shared/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
    ports:
      - "5173:5173"
    depends_on:
      - server
    command: >
      sh -c "corepack enable &&
      corepack prepare pnpm@10.32.1 --activate &&
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @stss/server db:generate &&
      pnpm --filter @stss/shared build &&
      pnpm --filter @stss/web dev --host 0.0.0.0"
    networks:
      - stss-network

  adminer:
    image: adminer:latest
    container_name: stss-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - stss-network

networks:
  stss-network:
    name: stss-network

volumes:
  postgres-data:
  root-node-modules:
  backend-node-modules:
  frontend-node-modules:
  shared-node-modules:
  pnpm-store:
